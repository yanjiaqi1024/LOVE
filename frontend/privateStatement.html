<!doctype html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>隐私声明</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="min-h-[100dvh] bg-[#fef8fa] text-on-surface">
    <main class="max-w-2xl mx-auto px-5 py-10 space-y-6">
      <header class="space-y-2">
        <h1 class="font-headline text-3xl font-bold text-primary">隐私声明</h1>
        <p class="text-sm text-on-surface-variant">版本：v1</p>
      </header>

      <section class="glass-panel rounded-xl p-6 space-y-4">
        <p class="text-sm leading-relaxed text-on-surface-variant">
          我们非常重视您的隐私与数据安全。本页面为隐私声明的占位内容，可根据实际业务与合规要求进行完善与更新。
        </p>
        <ul class="list-disc pl-5 text-sm leading-relaxed text-on-surface-variant space-y-2">
          <li>我们仅在提供服务所必需的范围内收集与处理信息。</li>
          <li>我们不会将您的信息出售给第三方。</li>
          <li>您可以随时联系管理员申请查询、导出或删除相关数据。</li>
        </ul>
      </section>

      <div class="text-center">
        <a class="text-sm text-primary underline underline-offset-4" href="/">返回首页</a>
      </div>
    </main>
  </body>
</html>
